<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>234 Player Hub - 4P One Button</title>
    <style>
        body { margin: 0; padding: 0; background-color: #1a1a2e; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; font-family: 'Segoe UI', Tahoma, sans-serif; touch-action: none; user-select: none; -webkit-user-select: none; }
        #game-container { position: relative; width: 100vw; height: 100vh; max-width: 1024px; max-height: 768px; box-shadow: 0 0 50px rgba(0,0,0,0.8); background-color: #2c3e50; overflow: hidden; }
        canvas { width: 100%; height: 100%; display: block; border-radius: 10px; }
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; display: flex; flex-direction: column; justify-content: space-between; }
        .score-board { display: flex; justify-content: center; gap: 40px; padding: 15px; font-size: 38px; font-weight: 900; text-shadow: 3px 3px 6px rgba(0,0,0,0.7); }
        .s-p1 { color: #ff4757; } .s-p2 { color: #1e90ff; } .s-p3 { color: #2ed573; } .s-p4 { color: #f1c40f; }
        .overlay-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(26, 26, 46, 0.95); pointer-events: auto; display: flex; flex-direction: column; justify-content: center; align-items: center; transition: opacity 0.3s; z-index: 10;}
        .hidden { opacity: 0; pointer-events: none !important; }
        h1 { font-size: 50px; margin: 0 0 10px 0; text-transform: uppercase; letter-spacing: 2px; text-shadow: 0 5px 15px rgba(0,0,0,0.5);}
        
        .menu-row { display: flex; gap: 20px; margin-bottom: 20px; flex-wrap: wrap; justify-content: center;}
        .game-card { width: 160px; padding: 15px; background: #34495e; border-radius: 15px; text-align: center; cursor: pointer; transition: transform 0.2s; border: 4px solid transparent;}
        .game-card:active { transform: scale(0.95); }
        .game-card h3 { margin: 0 0 5px 0; font-size: 20px; }
        .game-card p { margin: 0; font-size: 12px; color: #bdc3c7; }
        
        .controls-panel { display: flex; gap: 10px; margin-bottom: 20px; background: #2c3e50; padding: 10px; border-radius: 10px;}
        .control-btn { padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; background: #7f8c8d; color: white;}
        .control-btn.active { background: #e74c3c; }

        .tournament-box { margin-top: 20px; padding: 20px; background: rgba(0,0,0,0.5); border: 2px dashed #f1c40f; border-radius: 15px; text-align: center; position: relative; width: 600px;}
        .coming-soon-badge { position: absolute; top: -15px; right: -15px; background: #e74c3c; padding: 5px 15px; border-radius: 20px; font-weight: bold; transform: rotate(15deg); box-shadow: 0 5px 10px rgba(0,0,0,0.5);}
        .tourney-settings { display: flex; justify-content: center; gap: 15px; opacity: 0.5; pointer-events: none; margin-top: 15px;}
        .t-btn { padding: 5px 15px; background: #34495e; border: 1px solid #7f8c8d; color: white; border-radius: 5px;}
    </style>
</head>
<body>
    <div id="game-container">
        <canvas id="gameCanvas" width="1024" height="768"></canvas>
        <div id="ui-layer" class="hidden">
            <div class="score-board">
                <span class="s-p1" id="ui-s0">P1: 0</span>
                <span class="s-p2" id="ui-s1">P2: 0</span>
                <span class="s-p3 hidden" id="ui-s2">P3: 0</span>
                <span class="s-p4 hidden" id="ui-s3">P4: 0</span>
            </div>
        </div>
        
        <div id="menu-screen" class="overlay-screen">
            <h1>Mini Games Hub</h1>
            
            <div class="controls-panel">
                <span>Giocatori:</span>
                <button class="control-btn" id="btn-2p" onclick="setPlayers(2)">2P</button>
                <button class="control-btn" id="btn-3p" onclick="setPlayers(3)">3P</button>
                <button class="control-btn active" id="btn-4p" onclick="setPlayers(4)">4P</button>
            </div>

            <div class="menu-row">
                <div class="game-card" style="border-color: #2ed573;" onclick="startGame(STATE.TANKS)">
                    <h3 style="color: #2ed573;">Tanks</h3><p>Spara e Muoviti</p>
                </div>
                <div class="game-card" style="border-color: #f39c12;" onclick="startGame(STATE.SUMO)">
                    <h3 style="color: #f39c12;">Sumo</h3><p>Spingi fuori!</p>
                </div>
                <div class="game-card" style="border-color: #9b59b6;" onclick="startGame(STATE.SHAPES)">
                    <h3 style="color: #9b59b6;">Area Max</h3><p>Trova il più grande</p>
                </div>
            </div>

            <div class="tournament-box">
                <div class="coming-soon-badge">COMING SOON</div>
                <h3 style="margin:0; color:#f1c40f;">MODALITÀ TORNEO</h3>
                <p style="margin:5px 0 0 0; font-size:14px;">Sfida a punti con classifica finale e rotazione giochi!</p>
                <div class="tourney-settings">
                    <button class="t-btn">Round: 3/5/7/9</button>
                    <button class="t-btn">Giochi: Random</button>
                    <button class="t-btn">Avvia Torneo</button>
                </div>
            </div>
        </div>

        <div id="gameover-screen" class="overlay-screen hidden">
            <h1 id="winner-text">VINCE!</h1>
            <button class="control-btn" style="background:#3498db; font-size:24px; padding:15px 40px;" onclick="backToMenu()">Torna al Menu</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas'); const ctx = canvas.getContext('2d');
        const STATE = { MENU: 0, TANKS: 1, SUMO: 2, SHAPES: 3, GAMEOVER: 4 };
        let currentState = STATE.MENU;
        let numPlayers = 4;
        const MAX_SCORE = 3; 

        // Colori Ufficiali Giocatori: P1(Rosso), P2(Blu), P3(Verde), P4(Giallo)
        const P_COLORS = ['#ff4757', '#1e90ff', '#2ed573', '#f1c40f'];
        let players = [];

        // ==========================================
        //         SISTEMA INPUT "ONE BUTTON"
        // ==========================================
        const buttons = [
            { cx: 100, cy: 668, r: 80, color: P_COLORS[0], pressed: false, justPressed: false, justReleased: false, active: true }, // Bottom-Left (P1)
            { cx: 924, cy: 100, r: 80, color: P_COLORS[1], pressed: false, justPressed: false, justReleased: false, active: true }, // Top-Right (P2)
            { cx: 100, cy: 100, r: 80, color: P_COLORS[2], pressed: false, justPressed: false, justReleased: false, active: false }, // Top-Left (P3)
            { cx: 924, cy: 668, r: 80, color: P_COLORS[3], pressed: false, justPressed: false, justReleased: false, active: false }  // Bottom-Right (P4)
        ];

        // Simula i tasti su PC per test (Q=P1, M=P2, Z=P3, P=P4)
        const keyMap = {'KeyZ': 0, 'KeyM': 1, 'KeyQ': 2, 'KeyP': 3};
        window.addEventListener('keydown', e => { if(keyMap[e.code] !== undefined && buttons[keyMap[e.code]].active) { let b = buttons[keyMap[e.code]]; if(!b.pressed){ b.pressed = true; b.justPressed = true; }}});
        window.addEventListener('keyup', e => { if(keyMap[e.code] !== undefined && buttons[keyMap[e.code]].active) { let b = buttons[keyMap[e.code]]; b.pressed = false; b.justReleased = true; }});

        function getTouchPos(e, touch) { const rect = canvas.getBoundingClientRect(); return { x: (touch.clientX - rect.left) * (canvas.width / rect.width), y: (touch.clientY - rect.top) * (canvas.height / rect.height) }; }

        canvas.addEventListener('touchstart', e => { if (currentState===STATE.MENU || currentState===STATE.GAMEOVER) return; e.preventDefault(); for (let t of e.changedTouches) { let pos = getTouchPos(e, t); buttons.forEach((b, i) => { if (b.active && Math.hypot(pos.x - b.cx, pos.y - b.cy) < b.r * 1.5) { b.pressed = true; b.justPressed = true; b.touchId = t.identifier; } }); } }, {passive: false});
        canvas.addEventListener('touchend', e => { for (let t of e.changedTouches) { buttons.forEach(b => { if (b.touchId === t.identifier) { b.pressed = false; b.justReleased = true; b.touchId = null; } }); } });
        canvas.addEventListener('touchcancel', e => { for (let t of e.changedTouches) { buttons.forEach(b => { if (b.touchId === t.identifier) { b.pressed = false; b.justReleased = true; b.touchId = null; } }); } });

        function resetInputFrame() { buttons.forEach(b => { b.justPressed = false; b.justReleased = false; }); }

        function setPlayers(n) {
            numPlayers = n;
            document.querySelectorAll('.control-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('btn-'+n+'p').classList.add('active');
            buttons[2].active = (n >= 3); buttons[3].active = (n === 4);
        }

        function updateScoreUI() {
            for(let i=0; i<4; i++) {
                let el = document.getElementById('ui-s'+i);
                if(i < numPlayers) { el.classList.remove('hidden'); el.innerText = `P${i+1}: ${players[i].score}`; } 
                else { el.classList.add('hidden'); }
            }
        }

        function endGame(pIndex) { 
            currentState = STATE.GAMEOVER; 
            document.getElementById('ui-layer').classList.add('hidden'); 
            document.getElementById('gameover-screen').classList.remove('hidden'); 
            document.getElementById('winner-text').innerText = `P${pIndex+1} VINCE!`; 
            document.getElementById('winner-text').style.color = P_COLORS[pIndex]; 
        }

        // ==========================================
        //             1. TANKS GAME
        // ==========================================
        let bullets = [], powerups = [], obstacles = [], powerupTimer = 0;
        
        function initTanks() {
            let spawns = [ {x:150, y:618, a:-Math.PI/4}, {x:874, y:150, a:Math.PI-Math.PI/4}, {x:150, y:150, a:Math.PI/4}, {x:874, y:618, a:Math.PI+Math.PI/4} ];
            players = [];
            for(let i=0; i<numPlayers; i++) {
                players.push({ id: i, x: spawns[i].x, y: spawns[i].y, angle: spawns[i].a, rotDir: 1, color: P_COLORS[i], score: 0, isDead: false, respawnTimer: 0, ammo: 5, reloadTimer: 0, cooldown: 0, trails: [], abilities: { bounce: 0, destroy_walls: 0, pierce: 0, ghost: 0 } });
            }
            bullets = []; powerups = []; obstacles = [ {x: 412, y: 150, w: 200, h: 40, type: 'wall'}, {x: 412, y: 578, w: 200, h: 40, type: 'wall'}, {x: 300, y: 300, w: 40, h: 168, type: 'wall'}, {x: 684, y: 300, w: 40, h: 168, type: 'wall'} ];
        }

        function updateTanks() {
            powerupTimer--;
            if(powerupTimer <= 0) { powerups.push({ x: Math.random()*600+200, y: Math.random()*400+180, r: 16, type: ['bounce','destroy_walls','ghost','pierce'][Math.floor(Math.random()*4)] }); powerupTimer = 400; }

            players.forEach((p, i) => {
                if (p.isDead) { p.respawnTimer--; if(p.respawnTimer <= 0) { p.isDead = false; p.ammo = 5; p.abilities = { bounce: 0, destroy_walls: 0, pierce: 0, ghost: 0 }; } return; }
                
                let btn = buttons[i];
                if(p.cooldown > 0) p.cooldown--;
                if(p.ammo < 5) { p.reloadTimer++; if(p.reloadTimer>120){ p.ammo++; p.reloadTimer=0;} }
                for(let a in p.abilities) { if(a !== 'pierce' && p.abilities[a]>0) p.abilities[a]--; }

                // ONE BUTTON LOGIC: TANKS
                if (btn.justReleased) p.rotDir *= -1; // Inverti rotazione al rilascio
                
                let oldX = p.x; let oldY = p.y;
                if (!btn.pressed) {
                    p.angle += 0.045 * p.rotDir; // Ruota automaticamente
                } else {
                    p.x += Math.cos(p.angle) * 4; // Avanza
                    p.y += Math.sin(p.angle) * 4;
                    if(Math.random()<0.3) p.trails.push({x: p.x, y: p.y, a: p.angle, alpha: 0.6});
                    
                    // Sparo sul "Tap" iniziale
                    if (btn.justPressed && p.cooldown <= 0 && p.ammo > 0) {
                        bullets.push({ x: p.x + Math.cos(p.angle)*35, y: p.y + Math.sin(p.angle)*35, vx: Math.cos(p.angle)*12, vy: Math.sin(p.angle)*12, owner: p, r: 6, dead: false, wallDestroyer: p.abilities.destroy_walls>0, bounces: p.abilities.bounce>0?2:0, pierce: p.abilities.pierce>0 });
                        p.cooldown = 25; p.ammo--;
                        if(p.abilities.pierce > 0) { p.abilities.pierce--; if(p.abilities.pierce===0) p.ammo=5; }
                    }
                }
                
                p.trails.forEach(t => t.alpha -= 0.01); p.trails = p.trails.filter(t => t.alpha>0);
                if (p.x < 30) p.x = 30; if (p.x > canvas.width-30) p.x = canvas.width-30; if (p.y < 30) p.y = 30; if (p.y > canvas.height-30) p.y = canvas.height-30;

                obstacles.forEach(obs => {
                    let cx = p.x < obs.x ? obs.x : p.x > obs.x+obs.w ? obs.x+obs.w : p.x;
                    let cy = p.y < obs.y ? obs.y : p.y > obs.y+obs.h ? obs.y+obs.h : p.y;
                    if (Math.hypot(p.x-cx, p.y-cy) <= 24) { if(p.abilities.ghost <= 0) { p.x = oldX; p.y = oldY; } }
                });

                powerups.forEach((pu, idx) => { if(Math.hypot(p.x-pu.x, p.y-pu.y) < 40) { if(pu.type==='pierce') p.abilities[pu.type]=3; else p.abilities[pu.type]=300; p.ammo=5; powerups.splice(idx,1); }});
            });

            bullets.forEach(b => {
                if(b.dead) return; b.x+=b.vx; b.y+=b.vy;
                if(b.x<0||b.x>canvas.width) { if(b.bounces>0){b.vx*=-1;b.bounces--;b.x=b.x<0?0:canvas.width;}else b.dead=true; }
                if(b.y<0||b.y>canvas.height) { if(b.bounces>0){b.vy*=-1;b.bounces--;b.y=b.y<0?0:canvas.height;}else b.dead=true; }
                
                obstacles.forEach((obs, idx) => {
                    let cx = b.x < obs.x ? obs.x : b.x > obs.x+obs.w ? obs.x+obs.w : b.x; let cy = b.y < obs.y ? obs.y : b.y > obs.y+obs.h ? obs.y+obs.h : b.y;
                    if (Math.hypot(b.x-cx, b.y-cy) <= b.r) {
                        if(!b.pierce){ if(b.wallDestroyer) { obstacles.splice(idx,1); b.dead=true; } else if(b.bounces>0) { let horiz = Math.abs(b.x-cx)>Math.abs(b.y-cy); if(horiz) b.vx*=-1; else b.vy*=-1; b.bounces--; } else b.dead=true; }
                    }
                });

                players.forEach(p => {
                    if(!b.dead && !p.isDead && b.owner!==p && Math.hypot(b.x-p.x, b.y-p.y)<30) {
                        b.owner.score++; updateScoreUI(); if(!b.pierce) b.dead = true;
                        p.isDead = true; p.respawnTimer = 180; p.trails = [];
                        if(b.owner.score >= MAX_SCORE) endGame(b.owner.id);
                    }
                });
            });
            bullets = bullets.filter(b=>!b.dead);
        }

        function drawTanks() {
            ctx.fillStyle = '#e8dcb8'; ctx.fillRect(0,0,canvas.width,canvas.height);
            obstacles.forEach(o => { ctx.fillStyle='#d35400'; ctx.beginPath(); ctx.roundRect(o.x,o.y,o.w,o.h,5); ctx.fill(); });
            powerups.forEach(pu => { ctx.fillStyle='#34495e'; ctx.beginPath(); ctx.roundRect(pu.x-pu.r,pu.y-pu.r,pu.r*2,pu.r*2,4); ctx.fill(); ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(pu.x,pu.y,pu.r*0.5,0,Math.PI*2); ctx.fill(); });
            
            bullets.forEach(b => { ctx.save(); ctx.translate(b.x,b.y); ctx.rotate(Math.atan2(b.vy,b.vx)); ctx.fillStyle='#f39c12'; ctx.beginPath(); ctx.roundRect(-8,-4,16,8,4); ctx.fill(); ctx.restore(); });

            players.forEach(p => {
                if(p.isDead) return;
                p.trails.forEach(t=>{ ctx.save(); ctx.translate(t.x,t.y); ctx.rotate(t.a); ctx.fillStyle=`rgba(0,0,0,${t.alpha*0.2})`; ctx.fillRect(-20,-24,40,8); ctx.fillRect(-20,16,40,8); ctx.restore(); });
                ctx.save(); ctx.translate(p.x,p.y); ctx.rotate(p.angle);
                if(p.abilities.ghost>0) ctx.globalAlpha=0.5;
                ctx.fillStyle='#2d3436'; ctx.beginPath(); ctx.roundRect(-24,-26,48,14,4); ctx.fill(); ctx.beginPath(); ctx.roundRect(-24,12,48,14,4); ctx.fill();
                ctx.fillStyle=p.color; ctx.beginPath(); ctx.roundRect(-18,-18,36,36,8); ctx.fill(); ctx.strokeStyle='#000'; ctx.lineWidth=2; ctx.stroke();
                ctx.fillStyle='#718093'; ctx.beginPath(); ctx.roundRect(0,-4,35,8,3); ctx.fill(); ctx.fillStyle='#2f3640'; ctx.beginPath(); ctx.arc(0,0,12,0,Math.PI*2); ctx.fill();
                ctx.restore();
            });
        }

        // ==========================================
        //             2. SUMO GAME
        // ==========================================
        const ARENA = { x: 512, y: 384, r: 300 };
        
        function initSumo() {
            players = [];
            for(let i=0; i<numPlayers; i++) {
                let a = (Math.PI*2/numPlayers) * i;
                players.push({ id: i, x: ARENA.x + Math.cos(a)*150, y: ARENA.y + Math.sin(a)*150, angle: a+Math.PI, color: P_COLORS[i], score: 0, isDead: false, vx: 0, vy: 0 });
            }
        }

        function updateSumo() {
            let aliveCount = 0; let lastAlive = null;

            players.forEach((p, i) => {
                if(p.isDead) return;
                aliveCount++; lastAlive = p;
                
                let btn = buttons[i];
                // ONE BUTTON LOGIC: SUMO
                if (!btn.pressed) {
                    p.angle += 0.05; // Ruota sempre e solo in un verso
                } else {
                    p.vx += Math.cos(p.angle) * 0.3; // Accelera meno
                    p.vy += Math.sin(p.angle) * 0.3;
                }

                p.vx *= 0.94; p.vy *= 0.94; // Attrito alto
                p.x += p.vx; p.y += p.vy;

                if (Math.hypot(p.x - ARENA.x, p.y - ARENA.y) > ARENA.r) p.isDead = true;
            });

            // Collisioni
            for(let i=0; i<players.length; i++) {
                for(let j=i+1; j<players.length; j++) {
                    let p1 = players[i]; let p2 = players[j];
                    if(p1.isDead || p2.isDead) continue;
                    let dx = p2.x - p1.x; let dy = p2.y - p1.y; let dist = Math.hypot(dx,dy);
                    if(dist < 56) {
                        let overlap = 56 - dist; let nx = dx/dist; let ny = dy/dist;
                        p1.x -= nx*overlap/2; p1.y -= ny*overlap/2; p2.x += nx*overlap/2; p2.y += ny*overlap/2;
                        let dv = (p1.vx*nx + p1.vy*ny) - (p2.vx*nx + p2.vy*ny);
                        p1.vx -= dv*nx*1.2; p1.vy -= dv*ny*1.2; p2.vx += dv*nx*1.2; p2.vy += dv*ny*1.2;
                    }
                }
            }

            if(aliveCount <= 1) {
                if(lastAlive) { lastAlive.score++; updateScoreUI(); if(lastAlive.score >= MAX_SCORE) { endGame(lastAlive.id); return; } }
                for(let i=0; i<numPlayers; i++) { let a = (Math.PI*2/numPlayers) * i; players[i].x = ARENA.x + Math.cos(a)*150; players[i].y = ARENA.y + Math.sin(a)*150; players[i].angle = a+Math.PI; players[i].vx=0; players[i].vy=0; players[i].isDead=false; }
            }
        }

        function drawSumo() {
            ctx.fillStyle = '#1a1a2e'; ctx.fillRect(0,0,canvas.width,canvas.height);
            ctx.beginPath(); ctx.arc(ARENA.x, ARENA.y, ARENA.r+15, 0, Math.PI*2); ctx.fillStyle='#e74c3c'; ctx.fill();
            ctx.beginPath(); ctx.arc(ARENA.x, ARENA.y, ARENA.r, 0, Math.PI*2); ctx.fillStyle='#ecf0f1'; ctx.fill(); ctx.strokeStyle='#bdc3c7'; ctx.lineWidth=8; ctx.stroke();
            
            players.forEach(p => {
                if(p.isDead) return;
                ctx.save(); ctx.translate(p.x,p.y); ctx.rotate(p.angle);
                ctx.beginPath(); ctx.arc(0,0,28,0,Math.PI*2); ctx.fillStyle='#2d3436'; ctx.fill(); ctx.strokeStyle=p.color; ctx.lineWidth=5; ctx.stroke();
                ctx.beginPath(); ctx.roundRect(-15,-12,30,24,6); ctx.fillStyle=p.color; ctx.fill(); ctx.fillStyle='#f1c40f'; ctx.beginPath(); ctx.arc(0,0,10,0,Math.PI*2); ctx.fill();
                ctx.restore();
            });
        }

        // ==========================================
        //             3. SHAPES GAME (Nuovo!)
        // ==========================================
        let s_grid = []; let s_colors = []; let s_maxColorId = -1; let s_state = 'WAIT'; let s_timer = 0;

        function initShapes() {
            players = []; for(let i=0; i<numPlayers; i++) players.push({ id: i, score: 0 });
            generateShapesGrid();
        }

        function generateShapesGrid() {
            s_grid = []; let counts = [0,0,0,0];
            // Griglia 7x9 (63 blocchi)
            for(let r=0; r<7; r++) { s_grid[r] = []; for(let c=0; c<9; c++) { let cid = Math.floor(Math.random()*numPlayers); s_grid[r][c] = cid; counts[cid]++; } }
            // Smoothing per creare "blob"
            for(let i=0; i<3; i++) {
                let newGrid = JSON.parse(JSON.stringify(s_grid)); counts = [0,0,0,0];
                for(let r=0; r<7; r++) { for(let c=0; c<9; c++) {
                    let neighbors = [];
                    if(r>0) neighbors.push(s_grid[r-1][c]); if(r<6) neighbors.push(s_grid[r+1][c]); if(c>0) neighbors.push(s_grid[r][c-1]); if(c<8) neighbors.push(s_grid[r][c+1]);
                    newGrid[r][c] = neighbors[Math.floor(Math.random()*neighbors.length)]; counts[newGrid[r][c]]++;
                }}
                s_grid = newGrid;
            }
            s_maxColorId = counts.indexOf(Math.max(...counts.slice(0,numPlayers)));
            s_state = 'PLAY'; s_timer = 0;
        }

        function updateShapes() {
            if(s_state === 'WAIT') { s_timer++; if(s_timer > 90) generateShapesGrid(); return; }
            
            // Controlla chi preme per primo
            for(let i=0; i<numPlayers; i++) {
                if(buttons[i].justPressed) {
                    if(i === s_maxColorId) { players[i].score++; } else { players[i].score = Math.max(0, players[i].score - 1); }
                    updateScoreUI();
                    if(players[i].score >= MAX_SCORE) { endGame(i); return; }
                    s_state = 'WAIT'; s_timer = 0; break;
                }
            }
        }

        function drawShapes() {
            ctx.fillStyle = '#ecf0f1'; ctx.fillRect(0,0,canvas.width,canvas.height);
            let bSize = 60; let ox = (canvas.width - (9*bSize))/2; let oy = (canvas.height - (7*bSize))/2;
            
            // Sfondo griglia
            ctx.fillStyle = '#bdc3c7'; ctx.fillRect(ox-10, oy-10, 9*bSize+20, 7*bSize+20);
            ctx.fillStyle = '#fff'; ctx.fillRect(ox, oy, 9*bSize, 7*bSize);

            if (s_state === 'PLAY') {
                for(let r=0; r<7; r++) {
                    for(let c=0; c<9; c++) {
                        ctx.fillStyle = P_COLORS[s_grid[r][c]]; ctx.globalAlpha = 0.8;
                        ctx.fillRect(ox + c*bSize, oy + r*bSize, bSize, bSize); ctx.globalAlpha = 1;
                        ctx.strokeStyle = 'rgba(0,0,0,0.1)'; ctx.strokeRect(ox + c*bSize, oy + r*bSize, bSize, bSize);
                    }
                }
            } else {
                ctx.fillStyle = '#2c3e50'; ctx.font = "bold 50px Arial"; ctx.textAlign = "center";
                ctx.fillText("PREPARATI...", canvas.width/2, canvas.height/2); ctx.textAlign = "left";
            }
        }

        // ==========================================
        //             CORE LOOP & UI
        // ==========================================
        function startGame(gameType) {
            currentState = gameType;
            document.getElementById('menu-screen').classList.add('hidden'); document.getElementById('ui-layer').classList.remove('hidden');
            if(gameType === STATE.TANKS) initTanks(); else if(gameType === STATE.SUMO) initSumo(); else if(gameType === STATE.SHAPES) initShapes();
            updateScoreUI();
        }

        function backToMenu() { currentState = STATE.MENU; document.getElementById('gameover-screen').classList.add('hidden'); document.getElementById('menu-screen').classList.remove('hidden'); }

        function drawCornerButtons() {
            buttons.forEach(b => {
                if(!b.active) return;
                ctx.beginPath(); ctx.arc(b.cx, b.cy, b.r, 0, Math.PI*2);
                ctx.fillStyle = b.pressed ? b.color : 'rgba(255,255,255,0.1)'; ctx.fill();
                ctx.strokeStyle = b.color; ctx.lineWidth = 6; ctx.stroke();
                // Disegna icona dito (astratta)
                ctx.fillStyle = b.pressed ? '#fff' : b.color; ctx.beginPath(); ctx.arc(b.cx, b.cy, 20, 0, Math.PI*2); ctx.fill();
            });
        }

        function update() {
            if (currentState === STATE.TANKS) updateTanks(); else if (currentState === STATE.SUMO) updateSumo(); else if (currentState === STATE.SHAPES) updateShapes();
            resetInputFrame(); // Reset degli input a fine frame
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            if (currentState === STATE.MENU) return;
            if (currentState === STATE.TANKS) drawTanks(); else if (currentState === STATE.SUMO) drawSumo(); else if (currentState === STATE.SHAPES) drawShapes();
            drawCornerButtons();
        }

        function gameLoop() { update(); draw(); requestAnimationFrame(gameLoop); }
        gameLoop();
    </script>
</body>
</html>
